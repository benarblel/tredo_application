spring:
  application:
    name: tredo-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/tredodb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect